<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Rail O/D Explorer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #cfd8dc;
      height: 100vh;
      overflow: hidden;
    }

    #map { position: absolute; inset: 0; z-index: 1; }

    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      width: 280px;
      background: rgba(15, 25, 35, 0.92);
      border: 1px solid #1e3a4a;
      border-radius: 8px;
      backdrop-filter: blur(6px);
      overflow: hidden;
    }

    #panel-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1e3a4a;
    }

    #panel-header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #4fc3f7;
      margin-bottom: 10px;
    }

    #search-wrapper { position: relative; }

    #search {
      width: 100%;
      padding: 8px 10px;
      background: #0d1f2d;
      border: 1px solid #1e3a4a;
      border-radius: 5px;
      color: #eceff1;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: #4fc3f7; }
    #search::placeholder { color: #546e7a; }

    #panel-body { padding: 14px 16px; }

    .hint {
      font-size: 12px;
      color: #546e7a;
      line-height: 1.5;
    }

    .loading {
      font-size: 12px;
      color: #78909c;
      text-align: center;
      padding: 8px 0;
    }

    .stat-block { margin-bottom: 12px; }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 3px 0;
      font-size: 12px;
    }
    .stat-label { color: #78909c; }
    .stat-value { font-weight: 600; color: #eceff1; }

    .origin-name {
      font-size: 15px;
      font-weight: 700;
      color: #fdd835;
      margin-bottom: 8px;
    }

    .filter-block { margin-bottom: 14px; }

    .filter-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #78909c;
      margin-bottom: 5px;
    }
    .filter-label span:last-child { color: #4fc3f7; font-weight: 600; }

    #min-journeys {
      width: 100%;
      accent-color: #4fc3f7;
      cursor: pointer;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #546e7a;
      margin-bottom: 6px;
    }

    .top-list { font-size: 12px; }

    .top-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      border-bottom: 1px solid #1a2d3a;
      cursor: pointer;
      transition: color 0.1s;
    }
    .top-item:last-child { border-bottom: none; }
    .top-item:hover { color: #4fc3f7; }
    .top-item .dest-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .top-item .journey-count { flex-shrink: 0; margin-left: 8px; color: #78909c; font-size: 11px; }

    #legend {
      position: absolute;
      bottom: 30px;
      right: 16px;
      z-index: 1000;
      background: rgba(15, 25, 35, 0.88);
      border: 1px solid #1e3a4a;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 11px;
      color: #78909c;
    }
    #legend .legend-title { font-weight: 600; color: #cfd8dc; margin-bottom: 6px; }
    .legend-bar {
      width: 120px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, rgba(79,195,247,0.2), #4fc3f7, #ff9800, #e53935);
      margin: 4px 0;
    }
    .legend-ends {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <div id="panel-header">
      <h1>UK Rail O/D Explorer</h1>
      <div id="search-wrapper">
        <input id="search" type="text" list="station-list" placeholder="Search for a station..." autocomplete="off" />
        <datalist id="station-list"></datalist>
      </div>
    </div>
    <div id="panel-body">
      <p class="hint">Search above or click a station on the map to explore journey patterns.</p>
    </div>
  </div>

  <div id="legend" style="display:none">
    <div class="legend-title">Journeys (log scale)</div>
    <div class="legend-bar"></div>
    <div class="legend-ends"><span>Fewer</span><span>More</span></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
