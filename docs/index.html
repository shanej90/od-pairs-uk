<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UK Rail O/D Explorer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5/dist/darkly/bootstrap.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { height: 100vh; overflow: hidden; }

    #map { position: absolute; inset: 0; z-index: 1; }

    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 1000;
      width: 300px;
      max-height: calc(100vh - 32px);
      font-size: 0.8125rem;
      background: rgba(32, 35, 39, 0.95);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Let the single panel bg show through; children must be transparent */
    #panel > * { background: transparent !important; }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    #panel-body::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* origin station name */
    .origin-name { color: var(--bs-warning); font-size: 0.9375rem; font-weight: 700; margin-bottom: 0.5rem; }

    /* stat table rows */
    .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 0.2rem 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--bs-secondary-color); }
    .stat-value { font-weight: 600; }
    .stat-value.mono { font-family: var(--bs-font-monospace); font-size: 0.75rem; letter-spacing: 0.05em; }

    /* destination top-list */
    .top-item { display: flex; justify-content: space-between; align-items: center; padding: 0.25rem 0; border-bottom: 1px solid rgba(255,255,255,0.07); cursor: pointer; transition: color 0.1s; }
    .top-item:last-child { border-bottom: none; }
    .top-item:hover { color: var(--bs-info); }
    .top-item .dest-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .top-item .journey-count { flex-shrink: 0; margin-left: 0.5rem; color: var(--bs-secondary-color); font-size: 0.7rem; }

    /* legend */
    #legend {
      position: absolute;
      bottom: 30px;
      right: 16px;
      z-index: 1000;
      background: rgba(32, 35, 39, 0.95);
      backdrop-filter: blur(6px);
    }
    .legend-bar {
      width: 120px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, rgba(79,195,247,0.2), #4fc3f7, #ff9800, #e53935);
      margin: 4px 0;
    }
    .legend-ends { display: flex; justify-content: space-between; font-size: 0.65rem; }

    /* Leaflet layer control */
    .leaflet-control-layers {
      background: rgba(32, 35, 39, 0.95) !important;
      border: var(--bs-card-border-width) solid var(--bs-card-border-color) !important;
      border-radius: var(--bs-card-border-radius) !important;
      color: var(--bs-body-color) !important;
    }
    .leaflet-control-layers-toggle { background-color: rgba(32, 35, 39, 0.95) !important; }
    .leaflet-control-layers label { color: var(--bs-body-color); font-size: 0.8125rem; }
    .leaflet-control-layers-separator { border-top-color: var(--bs-card-border-color); }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="panel" class="card rounded">
    <div id="panel-header" class="card-header pb-2">
      <h1 class="h6 text-info mb-1" style="letter-spacing:0.05em;text-transform:uppercase">UK Rail O/D Explorer</h1>
      <p id="panel-year" class="text-muted mb-2" style="font-size:0.7rem">Based on 2024/25 estimates</p>
      <input id="search" type="text" list="station-list" class="form-control form-control-sm" placeholder="Search for an origin station…" autocomplete="off" />
      <datalist id="station-list"></datalist>
    </div>
    <div id="panel-body" class="card-body">
      <p class="text-muted small">Search above or click a station on the map to explore journey patterns.</p>
    </div>
    <div id="panel-footer" class="card-footer text-muted" style="font-size:0.65rem;line-height:1.6">
      <strong>Data sources</strong><br>
      OD data: <a href="https://dataportal.orr.gov.uk/statistics/usage/estimates-of-station-usage/" target="_blank" rel="noopener">Office of Rail and Road</a> (Open Government Licence v3.0)<br>
      Stations: <a href="https://github.com/davwheat/uk-railway-stations" target="_blank" rel="noopener">davwheat/uk-railway-stations</a><br>
      Theme: <a href="https://bootswatch.com/darkly/" target="_blank" rel="noopener">Bootswatch Darkly</a>
    </div>
  </div>

  <div id="legend" class="card" style="display:none">
    <div class="card-body p-2">
      <div class="fw-semibold small mb-1">Journeys (log scale)</div>
      <div class="legend-bar"></div>
      <div class="legend-ends text-muted"><span>Fewer</span><span>More</span></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
